<!-- apps/portal/templates/portal/processo_form.html -->
{% extends "portal/base.html" %}
{% block page_title %}Novo Processo{% endblock %}
{% block breadcrumb %}Processos / Novo{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-8">
    <div class="card card-primary">
      <div class="card-header"><h3 class="card-title">Cadastrar Novo Processo</h3></div>
      <form method="post">
        {% csrf_token %}
        <div class="card-body">
          <div class="form-group">
            <label>Número CNJ *</label>
            <input type="text" name="number" class="form-control" placeholder="0000000-00.0000.0.00.0000" required>
            <small class="text-muted">Número único do processo.</small>
          </div>
          
          <div class="form-group">
            <label>Tribunal</label>
            <input type="text" name="court" class="form-control" placeholder="Ex: TJSP, TRT-2, STJ">
          </div>
          
          <div class="form-group">
            <label>Assunto</label>
            <input type="text" name="subject" class="form-control" placeholder="Breve descrição do assunto">
          </div>
          
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Fase</label>
                <select name="phase" class="form-control">
                  {% for value, label in phase_choices %}
                    <option value="{{ value }}">{{ label }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Status</label>
                <select name="status" class="form-control">
                  <option value="active">Ativo</option>
                  <option value="suspended">Suspenso</option>
                  <option value="finished">Finalizado</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        
        <div class="card-footer">
          <button type="submit" class="btn btn-primary">Salvar</button>
          <a href="{% url 'portal:processos' %}" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
